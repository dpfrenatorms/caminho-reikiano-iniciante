<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:794px;height:1123px;overflow:hidden}
.cover{width:794px;height:1123px;position:relative;overflow:hidden;background:#1a1040;text-align:center;font-family:'Inter',sans-serif}
img.bg{position:absolute;top:0;left:0;width:794px;height:1123px;z-index:0}
.cv-in{position:relative;z-index:2;margin-top:360px}
.cv-title{font-family:'League Spartan',sans-serif;font-weight:900;font-size:44px;line-height:1.12;color:#3FD8E8;text-transform:uppercase;text-shadow:0 3px 14px rgba(22,8,45,.85)}
.cv-sub{font-family:'League Spartan',sans-serif;font-weight:700;font-size:19px;color:#FFFFFF;margin-top:16px;text-shadow:0 2px 10px rgba(22,8,45,.8)}
.cv-tag{font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;color:#F1EAFE;margin-top:34px;line-height:1.6;text-shadow:0 2px 8px rgba(22,8,45,.8)}
.cv-author{font-family:'League Spartan',sans-serif;font-weight:800;font-size:17px;letter-spacing:.3em;margin-top:46px;color:#fff;text-shadow:0 2px 8px rgba(22,8,45,.8)}
.cv-cred{font-weight:300;font-size:12.5px;color:#EDE6FA;margin-top:9px;letter-spacing:.06em;text-shadow:0 2px 8px rgba(22,8,45,.8)}
img.logo{position:absolute;bottom:44px;left:337px;width:120px;z-index:3}
</style></head><body>
<div class="cover">
  <img class="bg" src="../../canva-import/bg-cover-v3.png" alt="">
  <div class="cv-in">
    <div class="cv-title">O CAMINHO DO<br>REIKIANO INICIANTE</div>
    <div class="cv-sub">Da Primeira Aplicação ao Primeiro Cliente</div>
    <div class="cv-tag">Um guia prático para o reikiano iniciante sair do zero,<br>ganhar confiança e praticar com propósito</div>
    <div class="cv-author">RENATO MENEZES</div>
    <div class="cv-cred">Mestre de Reiki Nível IV · Sistema Tradicional Usui</div>
  </div>
  <img class="logo" src="../../canva-import/logo-omreikiom.png" alt="Om Reiki Om">
</div>
</body></html>
