<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><style>
@import url('https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@1,400;1,700&family=Inter:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:400px;overflow:hidden;font-family:'Inter',sans-serif}
.art{width:1200px;height:400px;position:relative;overflow:hidden;
  background:linear-gradient(120deg,#1a1040 0%,#2a1550 60%,#3a1a6a 100%)}
.glow{position:absolute;right:-120px;top:-120px;width:520px;height:520px;z-index:0;
  background:radial-gradient(circle,rgba(63,216,232,.22),rgba(63,216,232,0) 68%)}
.book{position:absolute;left:56px;top:50%;transform:translateY(-50%);height:348px;z-index:3;filter:drop-shadow(0 16px 28px rgba(0,0,0,.5))}
.txt{position:absolute;left:360px;top:50%;transform:translateY(-50%);width:620px;z-index:5}
.eyebrow{font-family:'League Spartan',sans-serif;font-weight:800;font-size:18px;letter-spacing:.16em;color:#3FD8E8;text-transform:uppercase}
h1{font-family:'League Spartan',sans-serif;font-weight:900;font-size:40px;line-height:1.06;color:#fff;text-transform:uppercase;margin:10px 0 6px}
.sub{font-family:'Playfair Display',serif;font-style:italic;font-size:22px;color:#CDB8F0}
.trust{display:flex;gap:22px;margin-top:20px}
.trust span{font-family:'League Spartan',sans-serif;font-weight:700;font-size:18px;color:#fff;white-space:nowrap}
.trust b{color:#3FD8E8;margin-right:6px}
.logo{position:absolute;right:52px;top:50%;transform:translateY(-50%);width:132px;z-index:4;opacity:.92}
</style></head><body>
<div class="art">
  <div class="glow"></div>
  <img class="book" src="book-crop.png" alt="">
  <div class="txt">
    <div class="eyebrow">E-book · Guia prático</div>
    <h1>O Caminho do Reikiano Iniciante</h1>
    <div class="sub">Da primeira aplicação ao primeiro cliente</div>
    <div class="trust">
      <span><b>✓</b>Compra segura</span>
      <span><b>✓</b>Acesso imediato</span>
      <span><b>✓</b>Garantia de 7 dias</span>
    </div>
  </div>
  <img class="logo" src="../../canva-import/logo-omreikiom.png" alt="Om Reiki Om">
</div>
</body></html>
